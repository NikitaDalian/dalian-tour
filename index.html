<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Тайны старого Даляня</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;background:#0f0c29;color:#fff;overflow:hidden;height:100vh;height:100dvh}

#welcome{
  position:fixed;inset:0;z-index:1000;
  background:linear-gradient(170deg,#0f0c29,#1a1a2e 50%,#16213e);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px;text-align:center;transition:opacity .6s,transform .6s;
}
#welcome.hidden{opacity:0;pointer-events:none;transform:translateY(-30px)}
#welcome img{width:80%;max-width:320px;border-radius:20px;box-shadow:0 8px 32px rgba(0,0,0,.3);margin-bottom:16px}
#welcome h1{font-family:'Dela Gothic One',sans-serif;font-size:26px;color:#FFD93D;margin-bottom:6px}
#welcome p{font-size:14px;color:rgba(255,255,255,.65);max-width:300px;margin-bottom:20px;line-height:1.5}
.tags{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:24px}
.tag{background:rgba(255,255,255,.08);border-radius:10px;padding:5px 10px;font-size:12px;color:rgba(255,255,255,.55)}
.btn-start{
  background:linear-gradient(135deg,#FF6B6B,#FF8E53);border:none;border-radius:16px;
  padding:14px 44px;font-size:17px;font-weight:800;color:#fff;cursor:pointer;
  font-family:'Nunito',sans-serif;box-shadow:0 4px 24px rgba(255,107,107,.4);
}

#app{display:none;height:100vh;height:100dvh;flex-direction:column}
#app.active{display:flex}

.hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 16px;background:rgba(15,12,41,.95);z-index:500;
  border-bottom:1px solid rgba(255,255,255,.06);
}
.hdr-step{font-size:13px;color:rgba(255,255,255,.5);font-weight:700}
.hdr-score{
  display:inline-flex;align-items:center;gap:5px;
  background:rgba(255,215,0,.15);border:1px solid rgba(255,215,0,.3);
  border-radius:16px;padding:3px 12px;font-size:13px;font-weight:700;color:#FFD93D;
}
.progress{width:100%;height:5px;background:rgba(255,255,255,.08)}
.progress-fill{
  height:100%;background:linear-gradient(90deg,#FFD93D,#FF6B6B);
  transition:width .5s cubic-bezier(.4,0,.2,1);border-radius:0 3px 3px 0;
}

#map{flex:1;min-height:0;z-index:1}
.leaflet-control-attribution{display:none!important}
.leaflet-control-zoom{display:none!important}

.panel{
  position:relative;z-index:400;
  background:linear-gradient(180deg,#1a1a2e,#0f0c29);
  border-top:1px solid rgba(255,255,255,.08);
  max-height:52dvh;overflow-y:auto;scroll-behavior:smooth;
}
.panel-handle{width:40px;height:4px;background:rgba(255,255,255,.2);border-radius:2px;margin:8px auto 4px}
.panel-content{padding:4px 16px 24px}
.stop-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.stop-emoji{font-size:32px}
.stop-title{font-family:'Dela Gothic One',sans-serif;font-size:17px;line-height:1.3}
.stop-cn{font-size:11px;color:rgba(255,255,255,.35)}
.stop-story{font-size:14px;color:rgba(255,255,255,.7);line-height:1.55;margin-bottom:12px}

.look-for{
  background:rgba(255,215,61,.08);border:1px solid rgba(255,215,61,.2);
  border-radius:10px;padding:8px 12px;margin-bottom:14px;
  display:flex;align-items:flex-start;gap:6px;font-size:13px;color:#FFD93D;line-height:1.4;
}

.quiz{background:rgba(255,255,255,.04);border-radius:14px;padding:14px}
.quiz-q{font-size:14px;font-weight:700;margin-bottom:10px}
.quiz-opts{display:flex;flex-direction:column;gap:6px}
.opt{
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);
  border-radius:10px;padding:10px 12px;text-align:left;color:rgba(255,255,255,.8);
  font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;cursor:pointer;
  display:flex;align-items:center;gap:8px;transition:all .25s;
}
.opt:disabled{cursor:default}
.opt .letter{
  width:24px;height:24px;border-radius:6px;background:rgba(255,255,255,.06);
  display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;
}
.opt.correct{background:rgba(46,204,113,.18);border-color:rgba(46,204,113,.45);color:#2ECC71}
.opt.wrong{background:rgba(231,76,60,.18);border-color:rgba(231,76,60,.45);color:#E74C3C}

.feedback{
  margin-top:10px;padding:10px 12px;border-radius:10px;
  font-size:13px;line-height:1.4;animation:fadeUp .35s ease;
}
.feedback.ok{background:rgba(46,204,113,.1);border:1px solid rgba(46,204,113,.2)}
.feedback.ok .fb-label{color:#2ECC71;font-weight:700}
.feedback.no{background:rgba(231,76,60,.1);border:1px solid rgba(231,76,60,.2)}
.feedback.no .fb-label{color:#E74C3C;font-weight:700}
.fb-fact{color:rgba(255,255,255,.55);margin-top:3px}

.btn-next{
  width:100%;margin-top:14px;border:none;border-radius:12px;
  padding:12px 0;font-size:15px;font-weight:800;color:#fff;cursor:pointer;
  font-family:'Nunito',sans-serif;display:none;
}
.btn-next.show{display:block}

#result{
  position:fixed;inset:0;z-index:900;
  background:linear-gradient(170deg,#0f0c29,#1a1a2e 50%,#16213e);
  display:none;flex-direction:column;align-items:center;justify-content:center;
  padding:24px;text-align:center;
}
#result.active{display:flex}
.res-emoji{font-size:72px;margin-bottom:12px}
.res-title{font-family:'Dela Gothic One',sans-serif;font-size:22px;color:#FFD93D;margin-bottom:16px}
.res-score{font-size:44px;font-weight:900}
.res-sub{font-size:14px;color:rgba(255,255,255,.45);margin-bottom:24px}
.diploma{
  background:linear-gradient(135deg,rgba(255,215,61,.08),rgba(255,107,107,.08));
  border:2px solid rgba(255,215,61,.25);border-radius:18px;padding:20px;
  max-width:300px;width:100%;margin-bottom:20px;
}
.diploma h3{font-family:'Dela Gothic One',sans-serif;font-size:15px;color:#FFD93D;margin-bottom:6px}
.diploma p{font-size:12px;color:rgba(255,255,255,.6);line-height:1.5}
.badges{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-top:10px}
.badge{background:rgba(255,255,255,.06);border-radius:6px;padding:3px 8px;font-size:11px;color:rgba(255,255,255,.55)}

.ach-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);
  z-index:950;display:none;align-items:center;justify-content:center;padding:20px;
}
.ach-overlay.show{display:flex}
.ach-box{
  background:linear-gradient(135deg,#1a1a2e,#16213e);border-radius:22px;padding:28px;
  text-align:center;max-width:280px;border:1px solid rgba(255,215,61,.25);
  box-shadow:0 0 50px rgba(255,215,61,.12);animation:popIn .4s ease;
}
.ach-icon{font-size:56px;margin-bottom:8px}
.ach-label{font-size:12px;color:#FFD93D;text-transform:uppercase;letter-spacing:2px;font-weight:600}
.ach-title{font-family:'Dela Gothic One',sans-serif;font-size:20px;margin:4px 0 14px}
.ach-btn{
  background:rgba(255,215,61,.15);border:1px solid rgba(255,215,61,.3);
  border-radius:10px;padding:8px 28px;color:#FFD93D;font-family:'Nunito',sans-serif;
  font-size:13px;font-weight:700;cursor:pointer;
}

.marker-icon{
  width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:900;color:#fff;border:2px solid rgba(255,255,255,.5);
  box-shadow:0 2px 8px rgba(0,0,0,.4);font-family:'Nunito',sans-serif;
}
.marker-icon.done{opacity:.5;transform:scale(.8)}
.marker-icon.current{animation:pulse 2s infinite;border-color:#FFD93D}
.marker-icon.future{opacity:.35}

@keyframes pulse{
  0%,100%{box-shadow:0 0 0 0 rgba(255,215,61,.5)}
  50%{box-shadow:0 0 0 12px rgba(255,215,61,0)}
}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
</style>
</head>

// === GCJ-02 conversion (WGS-84 → GCJ-02 for Gaode tiles) ===
const PI = Math.PI;
const A = 6378245.0;
const EE = 0.00669342162296594323;

function outOfChina(lat,lng){return lng<72.004||lng>137.8347||lat<0.8293||lat>55.8271}
function transformLat(x,y){
  let r=-100+2*x+3*y+0.2*y*y+0.1*x*y+0.2*Math.sqrt(Math.abs(x));
  r+=(20*Math.sin(6*x*PI)+20*Math.sin(2*x*PI))*2/3;
  r+=(20*Math.sin(y*PI)+40*Math.sin(y/3*PI))*2/3;
  r+=(160*Math.sin(y/12*PI)+320*Math.sin(y*PI/30))*2/3;
  return r;
}
function transformLng(x,y){
  let r=300+x+2*y+0.1*x*x+0.1*x*y+0.1*Math.sqrt(Math.abs(x));
  r+=(20*Math.sin(6*x*PI)+20*Math.sin(2*x*PI))*2/3;
  r+=(20*Math.sin(x*PI)+40*Math.sin(x/3*PI))*2/3;
  r+=(150*Math.sin(x/12*PI)+300*Math.sin(x/30*PI))*2/3;
  return r;
}
function wgs2gcj(wlat,wlng){
  if(outOfChina(wlat,wlng)) return [wlat,wlng];
  let dLat=transformLat(wlng-105,wlat-35);
  let dLng=transformLng(wlng-105,wlat-35);
  const radLat=wlat/180*PI;
  let magic=Math.sin(radLat);
  magic=1-EE*magic*magic;
  const sqrtMagic=Math.sqrt(magic);
  dLat=(dLat*180)/(A*(1-EE)/(magic*sqrtMagic)*PI);
  dLng=(dLng*180)/(A/sqrtMagic*Math.cos(radLat)*PI);
  return [wlat+dLat, wlng+dLng];
}

];

// Convert to GCJ-02
const STOPS = STOPS_WGS.map(s => {
  const [glat, glng] = wgs2gcj(s.lat, s.lng);
  return {...s, lat:glat, lng:glng};
});

const ACHS = [
  {t:3,icon:"🔍",title:"Начинающий исследователь"},
  {t:6,icon:"🧭",title:"Опытный разведчик"},
  {t:9,icon:"🗺️",title:"Мастер навигации"},
  {t:12,icon:"🏆",title:"Знаток Даляня"}
];

let map, markers=[], routeLine;
let cur=0, score=0, answered=false, earnedAchs=[];

function startApp(){
  document.getElementById('welcome').classList.add('hidden');
  document.getElementById('app').classList.add('active');
  setTimeout(initMap,100);
}

function initMap(){
  map = L.map('map',{zoomControl:false,attributionControl:false}).setView(wgs2gcj(38.9215,121.640),15);

  // Gaode (Amap) tiles — accessible in China without API key
  L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=2&style=8&x={x}&y={y}&z={z}',{
    subdomains:'1234', maxZoom:18
  }).addTo(map);

  const coords = STOPS.map(s=>[s.lat,s.lng]);
  routeLine = L.polyline(coords,{color:'rgba(255,215,61,0.4)',weight:3,dashArray:'8,8'}).addTo(map);

  STOPS.forEach((s,i)=>{
    const cls = i===0?'current':'future';
    const icon = L.divIcon({
      className:'',
      html:`<div class="marker-icon ${cls}" style="background:${s.color}" id="mk${i}">${i+1}</div>`,
      iconSize:[32,32], iconAnchor:[16,16]
    });
    const mk = L.marker([s.lat,s.lng],{icon}).addTo(map);
    mk.on('click',()=>{if(i<=cur) goToStop(i)});
    markers.push(mk);
  });

  renderStop();
  flyToCurrent();
}

function flyToCurrent(){
  const s=STOPS[cur];
  map.flyTo([s.lat,s.lng],16,{duration:1});
}

function updateMarkers(){
  STOPS.forEach((s,i)=>{
    const el=document.getElementById('mk'+i);
    if(!el)return;
    el.className='marker-icon '+(i<cur?'done':i===cur?'current':'future');
  });
}

function renderStop(){
  const s=STOPS[cur];
  answered=false;
  document.getElementById('stepLabel').textContent=`${cur+1} / ${STOPS.length}`;
  document.getElementById('progressBar').style.width=`${(cur+1)/STOPS.length*100}%`;

  const imgBlock = s.hasImage
    ? `<img src="${IMG_STATION}" style="width:100%;height:120px;object-fit:cover;border-radius:12px;margin-bottom:10px;">`
    : '';

  document.getElementById('panelContent').innerHTML=`
    ${imgBlock}
    <div class="stop-header">
      <span class="stop-emoji">${s.emoji}</span>
      <div><div class="stop-title">${s.title}</div><div class="stop-cn">${s.cn}</div></div>
    </div>
    <div class="stop-story">${s.story}</div>
    <div class="look-for"><span>👀</span><span>${s.look}</span></div>
    <div class="quiz">
      <div class="quiz-q">${s.q}</div>
      <div class="quiz-opts" id="opts">
        ${s.opts.map((o,i)=>`<button class="opt" onclick="answer(${i})"><span class="letter">${['A','B','C','D'][i]}</span>${o}</button>`).join('')}
      </div>
      <div id="fb"></div>
    </div>
    <button class="btn-next" id="btnNext" onclick="nextStop()" style="background:${s.color};box-shadow:0 4px 20px ${s.color}44;">
      ${cur<STOPS.length-1?'Следующая остановка →':'Посмотреть результат 🎓'}
    </button>
  `;
  document.getElementById('panel').scrollTop=0;
}

function answer(idx){
  if(answered)return;
  answered=true;
  const s=STOPS[cur];
  document.querySelectorAll('.opt').forEach((b,i)=>{
    b.disabled=true;
    if(i===s.ans)b.classList.add('correct');
    if(i===idx&&i!==s.ans)b.classList.add('wrong');
  });
  const ok=idx===s.ans;
  if(ok){
    score++;
    document.getElementById('scoreVal').textContent=score;
    const newAch=ACHS.find(a=>score>=a.t&&!earnedAchs.includes(a.t));
    if(newAch){earnedAchs.push(newAch.t);setTimeout(()=>showAch(newAch),700);}
  }
  document.getElementById('fb').innerHTML=`
    <div class="feedback ${ok?'ok':'no'}">
      <div class="fb-label">${ok?'✅ Правильно!':'❌ Не угадал!'}</div>
      <div class="fb-fact">💡 ${s.fact}</div>
    </div>`;
  document.getElementById('btnNext').classList.add('show');
}

function nextStop(){
  if(cur<STOPS.length-1){cur++;updateMarkers();renderStop();flyToCurrent();}
  else showResult();
}

function goToStop(idx){cur=idx;updateMarkers();renderStop();flyToCurrent();}

function showAch(a){
  document.getElementById('achIcon').textContent=a.icon;
  document.getElementById('achTitle').textContent=a.title;
  document.getElementById('achOverlay').classList.add('show');
}
function closeAch(){document.getElementById('achOverlay').classList.remove('show')}

function showResult(){
  document.getElementById('app').classList.remove('active');
  document.getElementById('result').classList.add('active');
  const pct=Math.round(score/STOPS.length*100);
  const g=pct>=90?{e:'🏆',t:'Гений Даляня!'}:pct>=70?{e:'🌟',t:'Отличный исследователь!'}:pct>=50?{e:'👍',t:'Хороший старт!'}:{e:'📚',t:'Попробуй ещё раз!'};
  document.getElementById('resEmoji').textContent=g.e;
  document.getElementById('resTitle').textContent=g.t;
  document.getElementById('resScore').textContent=`${score}/${STOPS.length}`;
  document.getElementById('diplomaText').textContent=`Исследователь прошёл маршрут «Тайны старого Даляня» и ответил на ${score} из ${STOPS.length} вопросов!`;
  document.getElementById('badges').innerHTML=ACHS.filter(a=>score>=a.t).map(a=>`<span class="badge">${a.icon} ${a.title}</span>`).join('');
}
</script>
</body>
</html>
