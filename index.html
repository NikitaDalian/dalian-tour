<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Тайны старого Даляня — v3</title>
<link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg1:#0f0c29;--bg2:#1a1a2e;--bg3:#16213e;--gold:#FFD93D;--red:#FF6B6B;--orange:#FF8E53;--green:#2ECC71;--err:#E74C3C}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;background:var(--bg1);color:#fff;overflow:hidden;height:100vh;height:100dvh}

/* === WELCOME === */
#welcome{position:fixed;inset:0;z-index:1000;background:linear-gradient(170deg,var(--bg1),var(--bg2) 50%,var(--bg3));display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;transition:opacity .6s,transform .6s}
#welcome.hidden{opacity:0;pointer-events:none;transform:translateY(-30px)}
#welcome img{width:80%;max-width:340px;border-radius:20px;box-shadow:0 8px 32px rgba(0,0,0,.3);margin-bottom:20px;aspect-ratio:500/273;object-fit:cover}
#welcome h1{font-family:'Dela Gothic One',sans-serif;font-size:clamp(22px,5vw,32px);color:var(--gold);margin-bottom:8px}
#welcome p{font-size:clamp(13px,2.5vw,16px);color:rgba(255,255,255,.65);max-width:400px;margin-bottom:24px;line-height:1.6}
.tags{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:28px}
.tag{background:rgba(255,255,255,.08);border-radius:10px;padding:6px 14px;font-size:13px;color:rgba(255,255,255,.55)}
.btn-start{background:linear-gradient(135deg,var(--red),var(--orange));border:none;border-radius:16px;padding:16px 48px;font-size:18px;font-weight:800;color:#fff;cursor:pointer;font-family:'Nunito',sans-serif;box-shadow:0 4px 24px rgba(255,107,107,.4);transition:transform .15s}
.btn-start:hover{transform:scale(1.03)}
.btn-start:active{transform:scale(.97)}

/* === APP === */
#app{display:none;height:100vh;height:100dvh;flex-direction:column}
#app.active{display:flex}

.hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:rgba(15,12,41,.95);z-index:600;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0}
.hdr-step{font-size:14px;color:rgba(255,255,255,.5);font-weight:700}
.hdr-score{display:inline-flex;align-items:center;gap:5px;background:rgba(255,215,0,.15);border:1px solid rgba(255,215,0,.3);border-radius:16px;padding:4px 14px;font-size:14px;font-weight:700;color:var(--gold)}
.progress{width:100%;height:5px;background:rgba(255,255,255,.08);flex-shrink:0}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--red));transition:width .5s;border-radius:0 3px 3px 0}

/* === MAP AREA === */
.main{display:flex;flex:1;min-height:0;overflow:hidden;position:relative}
.map-wrap{flex:1;overflow:auto;position:relative;background:var(--bg1);display:flex;align-items:center;justify-content:center}
.map-container{position:relative;display:inline-block;min-width:100%;min-height:100%}
.map-container img{display:block;width:100%;height:100%;object-fit:contain}

/* Hotspots */
.hotspot{
  position:absolute;transform:translate(-50%,-50%);
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:900;color:#fff;
  cursor:pointer;z-index:10;transition:all .3s;
  font-family:'Nunito',sans-serif;
  border:2.5px solid rgba(255,255,255,.5);
  box-shadow:0 2px 12px rgba(0,0,0,.6);
}
.hotspot.done{opacity:.4;transform:translate(-50%,-50%) scale(.7);border-color:rgba(255,255,255,.3)}
.hotspot.current{animation:hpulse 2s infinite;border-color:var(--gold);box-shadow:0 0 20px rgba(255,215,61,.4)}
.hotspot.future{opacity:.25;transform:translate(-50%,-50%) scale(.8)}
.hotspot.active{border-color:#fff;box-shadow:0 0 24px rgba(255,255,255,.3)}
@keyframes hpulse{0%,100%{box-shadow:0 0 0 0 rgba(255,215,61,.6)}50%{box-shadow:0 0 0 16px rgba(255,215,61,0)}}

/* === PANEL === */
.panel{
  position:absolute;right:0;top:0;bottom:0;width:420px;max-width:90vw;
  background:linear-gradient(180deg,rgba(26,26,46,.97),rgba(15,12,41,.98));
  border-left:1px solid rgba(255,255,255,.08);
  z-index:500;overflow-y:auto;
  transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);
  box-shadow:-8px 0 40px rgba(0,0,0,.5);
}
.panel.open{transform:translateX(0)}
.panel-close{position:sticky;top:0;display:flex;justify-content:flex-end;padding:12px 16px;background:linear-gradient(180deg,rgba(26,26,46,.98),transparent);z-index:2}
.panel-close button{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:6px 14px;color:rgba(255,255,255,.6);font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer}
.panel-close button:hover{background:rgba(255,255,255,.15)}
.panel-content{padding:0 24px 32px}

/* Mobile panel */
@media(max-width:767px){
  .panel{position:fixed;left:0;right:0;bottom:0;top:auto;width:100%;max-width:100%;height:65dvh;
    border-left:none;border-top:1px solid rgba(255,255,255,.1);border-radius:20px 20px 0 0;
    transform:translateY(100%)}
  .panel.open{transform:translateY(0)}
  .map-container img{min-width:150%;height:auto;object-fit:cover}
}

.stop-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.stop-emoji{font-size:32px;flex-shrink:0}
.stop-title{font-family:'Dela Gothic One',sans-serif;font-size:18px;line-height:1.3}
.stop-cn{font-size:11px;color:rgba(255,255,255,.35);margin-top:2px}
.stop-img{width:100%;max-height:160px;object-fit:cover;border-radius:14px;margin-bottom:14px}
.stop-story{font-size:14px;color:rgba(255,255,255,.72);line-height:1.6;margin-bottom:14px}
.look-for{background:rgba(255,215,61,.08);border:1px solid rgba(255,215,61,.2);border-radius:12px;padding:10px 14px;margin-bottom:16px;display:flex;align-items:flex-start;gap:8px;font-size:13px;color:var(--gold);line-height:1.45}
.quiz{background:rgba(255,255,255,.04);border-radius:14px;padding:16px}
.quiz-q{font-size:14px;font-weight:700;margin-bottom:12px}
.quiz-opts{display:flex;flex-direction:column;gap:7px}
.opt{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:11px 14px;text-align:left;color:rgba(255,255,255,.8);font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:10px;transition:all .2s}
.opt:hover:not(:disabled){background:rgba(255,255,255,.09)}
.opt:disabled{cursor:default}
.opt .letter{width:26px;height:26px;border-radius:7px;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0}
.opt.correct{background:rgba(46,204,113,.18);border-color:rgba(46,204,113,.45);color:var(--green)}
.opt.wrong{background:rgba(231,76,60,.18);border-color:rgba(231,76,60,.45);color:var(--err)}
.feedback{margin-top:12px;padding:12px 14px;border-radius:12px;font-size:13px;line-height:1.45;animation:fadeUp .35s ease}
.feedback.ok{background:rgba(46,204,113,.1);border:1px solid rgba(46,204,113,.2)}
.feedback.ok .fb-label{color:var(--green);font-weight:700}
.feedback.no{background:rgba(231,76,60,.1);border:1px solid rgba(231,76,60,.2)}
.feedback.no .fb-label{color:var(--err);font-weight:700}
.fb-fact{color:rgba(255,255,255,.55);margin-top:4px}
.btn-next{width:100%;margin-top:16px;border:none;border-radius:12px;padding:13px 0;font-size:15px;font-weight:800;color:#fff;cursor:pointer;font-family:'Nunito',sans-serif;display:none;transition:transform .15s}
.btn-next:hover{transform:scale(1.02)}
.btn-next.show{display:block}

/* === RESULT === */
#result{position:fixed;inset:0;z-index:900;background:linear-gradient(170deg,var(--bg1),var(--bg2) 50%,var(--bg3));display:none;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;overflow-y:auto}
#result.active{display:flex}
.res-emoji{font-size:72px;margin-bottom:12px}
.res-title{font-family:'Dela Gothic One',sans-serif;font-size:clamp(20px,4vw,28px);color:var(--gold);margin-bottom:16px}
.res-score{font-size:48px;font-weight:900}
.res-sub{font-size:15px;color:rgba(255,255,255,.45);margin-bottom:28px}
.diploma{background:linear-gradient(135deg,rgba(255,215,61,.08),rgba(255,107,107,.08));border:2px solid rgba(255,215,61,.25);border-radius:20px;padding:24px;max-width:340px;width:100%;margin-bottom:24px}
.diploma h3{font-family:'Dela Gothic One',sans-serif;font-size:16px;color:var(--gold);margin-bottom:8px}
.diploma p{font-size:13px;color:rgba(255,255,255,.6);line-height:1.5}
.badges{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:12px}
.badge{background:rgba(255,255,255,.06);border-radius:8px;padding:4px 10px;font-size:12px;color:rgba(255,255,255,.55)}
.ach-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);z-index:950;display:none;align-items:center;justify-content:center;padding:20px}
.ach-overlay.show{display:flex}
.ach-box{background:linear-gradient(135deg,var(--bg2),var(--bg3));border-radius:22px;padding:32px;text-align:center;max-width:300px;border:1px solid rgba(255,215,61,.25);box-shadow:0 0 60px rgba(255,215,61,.12);animation:popIn .4s ease}
.ach-icon{font-size:60px;margin-bottom:10px}
.ach-label{font-size:12px;color:var(--gold);text-transform:uppercase;letter-spacing:2px;font-weight:600}
.ach-title{font-family:'Dela Gothic One',sans-serif;font-size:20px;margin:6px 0 16px}
.ach-btn{background:rgba(255,215,61,.15);border:1px solid rgba(255,215,61,.3);border-radius:10px;padding:10px 32px;color:var(--gold);font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;cursor:pointer}

/* Hint arrow on map */
.hint-start{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(255,215,61,.2);border:1px solid rgba(255,215,61,.3);border-radius:12px;padding:10px 20px;color:var(--gold);font-size:14px;font-weight:700;z-index:20;animation:fadeUp 1s ease;pointer-events:none}

@keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
</style>
</head>

let cur=0,score=0,answered=false,earnedAchs=[],panelOpen=false;

function startApp(){
  document.getElementById('welcome').classList.add('hidden');
  document.getElementById('app').classList.add('active');
  setTimeout(()=>{createHotspots();updateHotspots()},200);
}

function createHotspots(){
  const container=document.getElementById('mapContainer');
  STOPS.forEach((s,i)=>{
    const dot=document.createElement('div');
    dot.className='hotspot future';
    dot.id='hs'+i;
    dot.style.left=s.x+'%';
    dot.style.top=s.y+'%';
    dot.style.background=s.color;
    dot.textContent=i+1;
    dot.onclick=()=>openStop(i);
    container.appendChild(dot);
  });
}

function updateHotspots(){
  STOPS.forEach((_,i)=>{
    const el=document.getElementById('hs'+i);
    if(!el)return;
    el.className='hotspot '+(i<cur?'done':i===cur?'current':'future');
  });
  document.getElementById('stepLabel').textContent=`${cur+1} / ${STOPS.length}`;
  document.getElementById('progressBar').style.width=`${(cur+1)/STOPS.length*100}%`;
}

function openStop(i){
  if(i>cur)return; // can't skip ahead
  const hint=document.getElementById('hintStart');
  if(hint)hint.remove();
  cur=i;
  answered=false;
  updateHotspots();
  renderPanel();
  document.getElementById('panel').classList.add('open');
  panelOpen=true;
  // highlight active
  const el=document.getElementById('hs'+i);
  if(el)el.classList.add('active');
}

function closePanel(){
  document.getElementById('panel').classList.remove('open');
  panelOpen=false;
  STOPS.forEach((_,i)=>{const el=document.getElementById('hs'+i);if(el)el.classList.remove('active')});
}

function renderPanel(){
  const s=STOPS[cur];
  const img=s.hasImage?`<img class="stop-img" src="${IMG_STATION}" alt="${s.title}">`:'';
  document.getElementById('panelContent').innerHTML=`
    ${img}
    <div class="stop-header"><span class="stop-emoji">${s.emoji}</span><div><div class="stop-title">${s.title}</div><div class="stop-cn">${s.cn}</div></div></div>
    <div class="stop-story">${s.story}</div>
    <div class="look-for"><span>👀</span><span>${s.look}</span></div>
    <div class="quiz">
      <div class="quiz-q">${s.q}</div>
      <div class="quiz-opts">${s.opts.map((o,j)=>`<button class="opt" onclick="answer(${j})"><span class="letter">${'ABCD'[j]}</span>${o}</button>`).join('')}</div>
      <div id="fb"></div>
    </div>
    <button class="btn-next" id="btnNext" onclick="nextStop()" style="background:${s.color};box-shadow:0 4px 20px ${s.color}44">${cur<STOPS.length-1?'Следующая остановка →':'Посмотреть результат 🎓'}</button>`;
  document.getElementById('panel').scrollTop=0;
}

function answer(idx){
  if(answered)return;answered=true;const s=STOPS[cur];
  document.querySelectorAll('.opt').forEach((b,i)=>{b.disabled=true;if(i===s.ans)b.classList.add('correct');if(i===idx&&i!==s.ans)b.classList.add('wrong')});
  const ok=idx===s.ans;
  if(ok){score++;document.getElementById('scoreVal').textContent=score;const a=ACHS.find(a=>score>=a.t&&!earnedAchs.includes(a.t));if(a){earnedAchs.push(a.t);setTimeout(()=>showAch(a),700)}}
  document.getElementById('fb').innerHTML=`<div class="feedback ${ok?'ok':'no'}"><div class="fb-label">${ok?'✅ Правильно!':'❌ Не угадал!'}</div><div class="fb-fact">💡 ${s.fact}</div></div>`;
  document.getElementById('btnNext').classList.add('show');
}

function nextStop(){
  closePanel();
  if(cur<STOPS.length-1){
    cur++;
    updateHotspots();
    // Small delay then auto-open
    setTimeout(()=>openStop(cur),500);
  }else{showResult()}
}

function showAch(a){document.getElementById('achIcon').textContent=a.icon;document.getElementById('achTitle').textContent=a.title;document.getElementById('achOverlay').classList.add('show')}
function closeAch(){document.getElementById('achOverlay').classList.remove('show')}

function showResult(){
  document.getElementById('app').classList.remove('active');document.getElementById('result').classList.add('active');
  const p=Math.round(score/STOPS.length*100),g=p>=90?{e:'🏆',t:'Гений Даляня!'}:p>=70?{e:'🌟',t:'Отличный исследователь!'}:p>=50?{e:'👍',t:'Хороший старт!'}:{e:'📚',t:'Попробуй ещё раз!'};
  document.getElementById('resEmoji').textContent=g.e;document.getElementById('resTitle').textContent=g.t;
  document.getElementById('resScore').textContent=`${score}/${STOPS.length}`;
  document.getElementById('diplomaText').textContent=`Исследователь прошёл маршрут «Тайны старого Даляня» и ответил на ${score} из ${STOPS.length} вопросов!`;
  document.getElementById('badges').innerHTML=ACHS.filter(a=>score>=a.t).map(a=>`<span class="badge">${a.icon} ${a.title}</span>`).join('');
}
</script>
</body>
</html>
